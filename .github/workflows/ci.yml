name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install Huff
        run: |
          curl -L https://raw.githubusercontent.com/huff-language/huff-installer/main/install.sh | bash
          echo "$HOME/.huff/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: forge install

      - name: Run tests
        run: forge test -vvv
